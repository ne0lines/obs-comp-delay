name: Build Windows Installer

on:
  push:
    branches:
      - main
    tags:
      - "v*"
      - "[0-9]*.[0-9]*.[0-9]*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  windows-installer:
    name: Windows setup.exe
    runs-on: windows-2022
    defaults:
      run:
        shell: pwsh

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Configure
        run: cmake --preset windows-ci-x64

      - name: Build plugin
        run: cmake --build --preset windows-x64 --config RelWithDebInfo --parallel -- /consoleLoggerParameters:Summary /noLogo

      - name: Run unit and codec tests
        run: ctest --test-dir build_x64 -C RelWithDebInfo --output-on-failure

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Build installer
        run: |
          $BuildSpec = Get-Content -Path buildspec.json -Raw | ConvertFrom-Json
          New-Item -ItemType Directory -Force -Path release | Out-Null

          iscc `
            "/DMyAppVersion=$($BuildSpec.version)" `
            "/DBuildDir=$((Resolve-Path 'build_x64\RelWithDebInfo').Path)" `
            "/DRundir=$((Resolve-Path 'build_x64\rundir\RelWithDebInfo').Path)" `
            "/DOutputDir=$((Resolve-Path 'release').Path)" `
            "installer\windows\obs-comp-delay.iss"

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: obs-comp-delay-windows-x64-setup
          path: release/obs-comp-delay-*-windows-x64-setup.exe
          if-no-files-found: error

      - name: Create GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@9d7c94cfd0a1f3ed45544c887983e9fa900f0564
        with:
          draft: false
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-beta') || contains(github.ref_name, '-rc') }}
          fail_on_unmatched_files: true
          files: release/obs-comp-delay-*-windows-x64-setup.exe
